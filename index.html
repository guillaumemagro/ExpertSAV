
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Expert Complice - Boulanger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-boulanger: #f56a00;
            --bleu-fonce: #1b1d29;
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            height: 100%; 
            background-color: #F8FAFC;
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            color: #1b1d29;
        }
        #root { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .font-work { font-family: 'Work Sans', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .rounded-boulanger { border-radius: 2rem; }
        
        /* Markdown Styling */
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul, .markdown-content ol { 
            margin-bottom: 0.75rem; 
            padding-left: 1.25rem; 
        }
        .markdown-content li { margin-bottom: 0.25rem; }
        .markdown-content strong { font-weight: 700; color: #1b1d29; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { 
            font-weight: 800; 
            margin-top: 1rem; 
            margin-bottom: 0.5rem; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
